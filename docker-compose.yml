x-restart: &restart
    restart: unless-stopped

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: vendocart-app
        <<: *restart
        expose:
            - "9000"
        environment:
            APP_ENV: ${APP_ENV:-local}
            DB_CONNECTION: ${DB_CONNECTION:-pgsql}
            DB_HOST: ${DB_HOST:-db}
            DB_PORT: ${DB_PORT:-5432}
            DB_DATABASE: ${DB_DATABASE:-vendocart}
            DB_USERNAME: ${DB_USERNAME:-vendo}
            DB_PASSWORD: ${DB_PASSWORD:-secret}
            REDIS_HOST: ${REDIS_HOST:-redis}
            REDIS_PORT: ${REDIS_PORT:-6379}
        networks:
            - vendocart-network
        volumes:
            -   .:/var/www
        depends_on:
            - postgres
            - redis

    nginx:
        image: nginx:alpine
        container_name: vendocart-nginx
        ports:
            - "${APP_PORT:-8000}:80"
        networks:
            - vendocart-network
        volumes:
            - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
            - .:/var/www:ro
        depends_on:
            - app

    postgres:
        image: postgres:15
        container_name: vendorcart-postgres
        <<: *restart
        ports:
            - "${DB_PUBLISH_PORT:-5432}:5432"
        environment:
            POSTGRES_DB: ${DB_DATABASE:-vendocart}
            POSTGRES_USER: ${DB_USERNAME:-vendo}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
        networks:
            - vendocart-network
        volumes:
            - pgdata:/var/lib/postgresql/data

    redis:
        image: redis:alpine
        container_name: vendocart-redis
        <<: *restart
        ports:
            - "${REDIS_PUBLISH_PORT:-6379}:6379"
        networks:
            - vendocart-network

networks:
    vendocart-network:
        driver: bridge

volumes:
    pgdata:
