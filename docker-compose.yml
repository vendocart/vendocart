x-restart: &restart
    restart: unless-stopped

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: vendocart-app
        <<: *restart
        expose:
            - "9000"
        environment:
            APP_ENV: ${APP_ENV:-local}
            DB_CONNECTION: ${DB_CONNECTION:-pgsql}
            DB_HOST: ${DB_HOST:-db}
            DB_PORT: ${DB_PORT:-5432}
            DB_DATABASE: ${DB_DATABASE:-vendocart}
            DB_USERNAME: ${DB_USERNAME:-vendo}
            DB_PASSWORD: ${DB_PASSWORD:-secret}
            REDIS_HOST: ${REDIS_HOST:-redis}
            REDIS_PORT: ${REDIS_PORT:-6379}
        networks:
            - vendocart-network
        volumes:
            -   .:/var/www
        depends_on:
            - postgres
            - redis

    nginx:
        image: nginx:alpine
        container_name: vendocart-nginx
        ports:
            - "${APP_PORT:-8000}:80"
        networks:
            - vendocart-network
        volumes:
            - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
            - .:/var/www:ro
        depends_on:
            - app

    postgres:
        image: postgres:15
        container_name: vendorcart-postgres
        <<: *restart
        ports:
            - "${DB_PUBLISH_PORT:-5432}:5432"
        environment:
            POSTGRES_DB: ${DB_DATABASE:-vendocart}
            POSTGRES_USER: ${DB_USERNAME:-vendo}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
        networks:
            - vendocart-network
        volumes:
            - pgdata:/var/lib/postgresql/data

    redis:
        image: redis:alpine
        container_name: vendocart-redis
        <<: *restart
        ports:
            - "${REDIS_PUBLISH_PORT:-6379}:6379"
        networks:
            - vendocart-network

networks:
    vendocart-network:
        driver: bridge

volumes:
    pgdata:

## Old version
x-restart-policy: &restart_policy
    restart: unless-stopped

x-mongo: &db-mongo
    image: '${GIT_REGISTRY}mongo:4.0'
    <<: *restart_policy
    profiles:
        - mongo
    expose:
        - 27017
    volumes:
        - ./docker/mongo-init:/docker-entrypoint-initdb.d:rw
    environment:
        MONGO_DATABASE: ${MONGO_DATABASE:-opium_db}
        MONGO_USERNAME: ${MONGO_USERNAME:-opium-user}
        MONGO_PASSWORD: ${MONGO_PASSWORD:-secret}
        MONGO_BI_USERNAME: ${MONGO_BI_USERNAME:-bi-user}
        MONGO_BI_PASSWORD: ${MONGO_BI_PASSWORD:-secret}
        MONGO_EXPRESS_USERNAME: ${MONGO_EXPRESS_USERNAME:-express-user}
        MONGO_EXPRESS_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-secret}
        MONGO_NOC_USERNAME: ${MONGO_NOC_USERNAME:-noc-user}
        MONGO_NOC_PASSWORD: ${MONGO_NOC_PASSWORD:-secret}
        MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
        MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
        MONGO_INITDB_DATABASE: admin

x-postgres: &db-postgres-settings
    image: '${GIT_REGISTRY}opium-postgres:postgis-15-3.3'
    <<: *restart_policy
    expose:
        - 5432
    env_file:
        - .env
    environment:
        PGDATA: /home/postgres/data/pgdata
        POSTGRES_USER: ${DB_USERNAME}
        POSTGRES_PASSWORD: ${DB_PASSWORD}
        POSTGRES_DB: ${DB_DATABASE}

x-healthcheck-defaults: &healthcheck_defaults
    start_period: 15s
    interval: 10s
    timeout: 10s
    retries: 30

x-kafka: &kafka
    <<: *restart_policy
    image: '${GIT_REGISTRY}opium-kafka:v0.1'
    depends_on:
        zookeeper:
            condition: service_healthy
    environment:
        KAFKA_CLUSTER_ID: 22
        KAFKA_ZOOKEEPER: zookeeper:2181
    ulimits:
        nofile:
            soft: 4096
            hard: 4096
    healthcheck:
        <<: *healthcheck_defaults
        test: [
            "CMD-SHELL",
            "kafka-topics.sh --bootstrap-server localhost:9092 --list --command-config /tmp/command-auth.properties"
        ]

x-app-image: &app-image
    image: '${GIT_REGISTRY}opium-app:v0.6'
    <<: *restart_policy

x-cron-image: &cron-image
    image: '${GIT_REGISTRY}opium-cron:v0.4.1'
    <<: *restart_policy

services:
    nginx:
        image: '${GIT_REGISTRY}opium-nginx:1.25.3'
        restart: unless-stopped
        ports:
            - "${WEB_PORT}:80"
        volumes:
            - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
            - ./:/var/www
        links:
            - app

    app:
        <<: *app-image
        user: opium-user
        volumes:
            - .:/var/www
        links:
            - redis
        security_opt:
            - seccomp:unconfined
            - apparmor:unconfined
        cap_add:
            - SYS_ADMIN
        privileged: true

    cron:
        <<: *cron-image
        volumes:
            - .:/var/www
        links:
            - redis
            - app

    worker:
        <<: *app-image
        command: bash -c "sleep 3; php artisan horizon"
        healthcheck:
            test: /usr/local/bin/php /var/www/artisan horizon:status || exit 1
            interval: 10s
            timeout: 10s
            start_period: 5s
            retries: 3
        logging:
            driver: syslog
        volumes:
            - .:/var/www
        links:
            - redis

    sync:
        <<: *app-image
        command: bash -c "sleep 15; php artisan sync:consume:work"
        healthcheck:
            test: /usr/local/bin/php /var/www/artisan sync:consume:status || exit 1
            interval: 30s
            timeout: 10s
            start_period: 5s
            retries: 5
        logging:
            driver: syslog
        volumes:
            - .:/var/www
        links:
            - redis

    zookeeper:
        profiles:
            - main
        <<: *restart_policy
        image: '${GIT_REGISTRY}opium-zookeeper:v0.1'
        environment:
            ZOOKEEPER_DATA_DIR: /zookeeper/data/zookeeper
            KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok"
        volumes:
            - ${KAFKA_DATA_PATH:-./.kafkaData}:/zookeeper/data
        healthcheck:
            <<: *healthcheck_defaults
            test:
              ["CMD-SHELL", 'echo "ruok" | nc -w 2 localhost 2181 | grep imok']

    kafka-1:
        profiles:
            - main
        <<: *kafka
        ports:
            - "${KAFKA_1_PORT}:${KAFKA_1_PORT}"
        environment:
            KAFKA_OPTS: "-Djava.security.auth.login.config=/tmp/kafka_jaas.conf"
            KAFKA_LOG_DIRS: /kafka/data/kafka-1
            KAFKA_ZOOKEEPER: zookeeper:2181
            KAFKA_BROKER_ID: 0
            KAFKA_LISTENERS: "SASL_PLAINTEXT://:9092,EXTERNAL://:${KAFKA_1_PORT}"
            KAFKA_ADVERTISED_LISTENERS: "SASL_PLAINTEXT://kafka-1:9092,EXTERNAL://${SYNC_SERVE_HOST:-localhost}:${KAFKA_1_PORT}"
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "SASL_PLAINTEXT:SASL_PLAINTEXT,EXTERNAL:SASL_PLAINTEXT"
            KAFKA_SECURITY_INTER_BROKER_PROTOCOL: SASL_PLAINTEXT
            KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
        volumes:
            - ${KAFKA_DATA_PATH:-./.kafkaData}:/kafka/data
            - ./docker/kafka/command-auth.properties:/tmp/command-auth.properties
            - ./docker/kafka/kafka_jaas.conf:/tmp/kafka_jaas.conf

    kafka-2:
        profiles:
            - main
        <<: *kafka
        ports:
            - "${KAFKA_2_PORT}:${KAFKA_2_PORT}"
        environment:
            KAFKA_OPTS: "-Djava.security.auth.login.config=/tmp/kafka_jaas.conf"
            KAFKA_LOG_DIRS: /kafka/data/kafka-2
            KAFKA_ZOOKEEPER: zookeeper:2181
            KAFKA_BROKER_ID: 1
            KAFKA_LISTENERS: "SASL_PLAINTEXT://:9092,EXTERNAL://:${KAFKA_2_PORT}"
            KAFKA_ADVERTISED_LISTENERS: "SASL_PLAINTEXT://kafka-2:9092,EXTERNAL://${SYNC_SERVE_HOST:-localhost}:${KAFKA_2_PORT}"
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "SASL_PLAINTEXT:SASL_PLAINTEXT,EXTERNAL:SASL_PLAINTEXT"
            KAFKA_SECURITY_INTER_BROKER_PROTOCOL: SASL_PLAINTEXT
            KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
        volumes:
            - ${KAFKA_DATA_PATH:-./.kafkaData}:/kafka/data
            - ./docker/kafka/command-auth.properties:/tmp/command-auth.properties
            - ./docker/kafka/kafka_jaas.conf:/tmp/kafka_jaas.conf

    kafka-3:
        profiles:
            - main
        <<: *kafka
        ports:
            - "${KAFKA_3_PORT}:${KAFKA_3_PORT}"
        environment:
            KAFKA_OPTS: "-Djava.security.auth.login.config=/tmp/kafka_jaas.conf"
            KAFKA_LOG_DIRS: /kafka/data/kafka-3
            KAFKA_ZOOKEEPER: zookeeper:2181
            KAFKA_BROKER_ID: 2
            KAFKA_LISTENERS: "SASL_PLAINTEXT://:9092,EXTERNAL://:${KAFKA_3_PORT}"
            KAFKA_ADVERTISED_LISTENERS: "SASL_PLAINTEXT://kafka-3:9092,EXTERNAL://${SYNC_SERVE_HOST:-localhost}:${KAFKA_3_PORT}"
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "SASL_PLAINTEXT:SASL_PLAINTEXT,EXTERNAL:SASL_PLAINTEXT"
            KAFKA_SECURITY_INTER_BROKER_PROTOCOL: SASL_PLAINTEXT
            KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
        volumes:
            - ${KAFKA_DATA_PATH:-./.kafkaData}:/kafka/data
            - ./docker/kafka/command-auth.properties:/tmp/command-auth.properties
            - ./docker/kafka/kafka_jaas.conf:/tmp/kafka_jaas.conf

    redis:
        image: '${GIT_REGISTRY}opium-redis:7.2-alpine'
        restart: unless-stopped
        volumes:
            - redis_data:/data
        expose:
            - 6379
        ports:
            - "${REDIS_PUBLISH_PORT:-6379}:6379"

    db:
        <<: *db-postgres-settings
        profiles:
            - local-pgsql
            - development-pgsql
            - pipe-line
        ports:
            - "${DATABASE_PUBLISH_PORT:-5432}:5432"
        volumes:
            - ${DATABASE_DATA_PATH:-./.databaseData/${DB_CONNECTION}}:/home/postgres/data:rw
            - ./docker/postgres/init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql:ro

    db_testing:
        <<: *db-postgres-settings
        profiles:
            - local-pgsql
            - development-pgsql
            - pipe-line
        tmpfs:
            - /home/postgres/data

    adminer:
        profiles:
            - local
            - adminer
        image: '${GIT_REGISTRY}opium-adminer:4.8.1'
        <<: *restart_policy
        ports:
            - "${ADMINER_PORT}:8080"

    pgadmin:
        profiles:
            - local
            - pgadmin
        image: '${GIT_REGISTRY}opium-pgadmin:8.5'
        <<: *restart_policy
        volumes:
            - "pgadmin:/var/lib/pgadmin"
        ports:
            - "${PGADMIN_PORT:-8181}:80"
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-develop@email.com}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-secret}

    mongo:
        <<: *db-mongo
        ports:
            - ${MONGO_PUBLISH_PORT:-27017}:27017
        volumes:
            - ${MONGO_DATA_PATH:-.databaseData/mongodb}:/data/db:rw
            - ./docker/mongo-init:/docker-entrypoint-initdb.d:rw

    mongo_testing:
        <<: *db-mongo
        tmpfs: /data/db

    mongo-express:
        image: '${GIT_REGISTRY}mongo-express:1-20-alpine3.19'
        profiles:
            - local
            - development
        <<: *restart_policy
        links:
            - mongo
        ports:
            - ${MONGO_EXPRESS_PORT:-8484}:8081
        environment:
            ME_CONFIG_MONGODB_ENABLE_ADMIN: true
            ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-express-user}
            ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-secret}
            ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME:-root}
            ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
            ME_CONFIG_MONGODB_PORT: 27017
            ME_CONFIG_MONGODB_SERVER: mongo

    printer-service:
        image: git.ordev.ir:9512/frontend/coca:1.0.1
        ports:
            - "9658:9658"
        restart: unless-stopped


volumes:
    pgadmin:
    redis_data:
        driver: local
